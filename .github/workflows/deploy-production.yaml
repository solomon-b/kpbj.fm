name: Deploy to Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to deploy (e.g., v0.3.2)'
        required: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Validate release tag
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          if ! echo "$TAG" | grep -qP '^v\d+\.\d+\.\d+$'; then
            echo "ERROR: '$TAG' is not a valid release tag (expected v{major}.{minor}.{patch})"
            exit 1
          fi
          if ! git tag --list | grep -qx "$TAG"; then
            echo "ERROR: Tag '$TAG' does not exist"
            exit 1
          fi

      - name: Install Nix
        uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@87b14cf437d03d37989d87f0fa5ce4f5dc1a330b # v8

      - name: Setup Cachix
        uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
        with:
          name: kpbj-fm
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          pushFilter: '(-kpbj-api|-sync-host-emails|-token-cleanup|-lucid-|-web-server-core)'

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.PRODUCTION_KNOWN_HOST }}" >> ~/.ssh/known_hosts

      - name: Pre-deploy database backup
        run: |
          ssh root@ssh.kpbj.fm \
            'sudo -u postgres bash -c "set -a; . /run/secrets/rendered/kpbj-pgbackrest-s3.env; pgbackrest backup --stanza=kpbj --type=full --repo=1"'
          ssh root@ssh.kpbj.fm \
            'sudo -u postgres bash -c "set -a; . /run/secrets/rendered/kpbj-pgbackrest-s3.env; pgbackrest backup --stanza=kpbj --type=full --repo=2"' \
            || echo '::warning::S3 backup (repo2) failed — continuing with deploy'

      - name: Deploy NixOS configuration
        run: |
          nix shell nixpkgs#nixos-rebuild -c \
            nixos-rebuild switch \
            --flake .#kpbj-prod \
            --target-host root@ssh.kpbj.fm
